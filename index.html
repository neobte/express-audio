<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Julio César">
    <meta name="keywords"
        content="Audio Player, Music Player, Express Audio, Web Player, Music APP, Reproductor de Música, Reproductor de Audio, Reproductor Web de Audio">
    <link rel="shortcut icon" href="neobte_logo.png" type="image/png" sizes="16x16 32x32">
    <!-- Preconnect (speed boost) -->
    <link rel="preconnect" href="https://neobte.github.io" crossorigin>
    <title id="document-title"></title>
    <link rel="stylesheet" href="styles.css">

<body>

    <header class="">
    </header>

    <main class="container">

        <div class="player-track">
            <h3 id="player-track-title">Nada esta sonando...</h3>
            <p id="player-track-artist"></p>
        </div>

        <div class="track-position-container">
            <div class="player-track-position">
                <span id="player-current-track">-</span>
                /
                <span id="player-total-tracks">-</span>
            </div>
        </div>

        <div class="playlist-container">

            <ul id="playlist">
                <li class="playlist-track">
                    <div class="playlist-track__number">
                        <span>1</span>
                    </div>
                    <div class="playlist-track__info">
                        <h3 class="playlist-track__title">Sin Disfraz</h3>
                        <p class="playlist-track__artist">Virus</p>
                    </div>
                    <div class="playlist-track__duration">
                        <span>3:33</span>
                    </div>
                </li>
                <li class="playlist-track">
                    <div class="playlist-track__number">
                        <span>10</span>
                    </div>
                    <div class="playlist-track__info">
                        <h3 class="playlist-track__title">Todo Estaba Bien</h3>
                        <p class="playlist-track__artist">Grupo Río</p>
                    </div>
                    <div class="playlist-track__duration">
                        <span>4:22</span>
                    </div>
                </li>
                <li class="playlist-track">
                    <div class="playlist-track__number">
                        <span>100</span>
                    </div>
                    <div class="playlist-track__info">
                        <h3 class="playlist-track__title">Always On My Mind</h3>
                        <p class="playlist-track__artist">Pet Shop Boys</p>
                    </div>
                    <div class="playlist-track__duration">
                        <span>3:53</span>
                    </div>
                </li>
            </ul>

        </div>

        <div class="current-time-container">
            <span id="current-time" class="time">-:--</span>
            <input type="range" id="current-time-slider" class="slider" min="0" max="100" value="0" step=".01">
            <span id="duration-time" class="time">-:--</span>
        </div>

        <div class="controls">

            <!-- Shuffle btn -->
            <button id="shuffle-btn" class="btn" title="Activar reproducción aleatoria">
                <!-- Shuffle icon -->
                <svg id="shuffle-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                    <path fill="currentColor"
                        d="M467.8 98.4C479.8 93.4 493.5 96.2 502.7 105.3L566.7 169.3C572.7 175.3 576.1 183.4 576.1 191.9C576.1 200.4 572.7 208.5 566.7 214.5L502.7 278.5C493.5 287.7 479.8 290.4 467.8 285.4C455.8 280.4 448 268.9 448 256L448 224L416 224C405.9 224 396.4 228.7 390.4 236.8L358 280L318 226.7L339.2 198.4C357.3 174.2 385.8 160 416 160L448 160L448 128C448 115.1 455.8 103.4 467.8 98.4zM218 360L258 413.3L236.8 441.6C218.7 465.8 190.2 480 160 480L96 480C78.3 480 64 465.7 64 448C64 430.3 78.3 416 96 416L160 416C170.1 416 179.6 411.3 185.6 403.2L218 360zM502.6 534.6C493.4 543.8 479.7 546.5 467.7 541.5C455.7 536.5 448 524.9 448 512L448 480L416 480C385.8 480 357.3 465.8 339.2 441.6L185.6 236.8C179.6 228.7 170.1 224 160 224L96 224C78.3 224 64 209.7 64 192C64 174.3 78.3 160 96 160L160 160C190.2 160 218.7 174.2 236.8 198.4L390.4 403.2C396.4 411.3 405.9 416 416 416L448 416L448 384C448 371.1 455.8 359.4 467.8 354.4C479.8 349.4 493.5 352.2 502.7 361.3L566.7 425.3C572.7 431.3 576.1 439.4 576.1 447.9C576.1 456.4 572.7 464.5 566.7 470.5L502.7 534.5z" />
                    <circle r="50" cx="120" cy="320" fill="currentColor" class="d-none"></circle>
                </svg>
            </button>

            <!-- Backward-step btn -->
            <button id="backward-step-btn" class="btn" title="Anterior">
                <!-- Backward-step icon -->
                <svg id="backward-step-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                    <path fill="currentColor"
                        d="M491 100.8C478.1 93.8 462.3 94.5 450 102.6L192 272.1L192 128C192 110.3 177.7 96 160 96C142.3 96 128 110.3 128 128L128 512C128 529.7 142.3 544 160 544C177.7 544 192 529.7 192 512L192 367.9L450 537.5C462.3 545.6 478 546.3 491 539.3C504 532.3 512 518.8 512 504.1L512 136.1C512 121.4 503.9 107.9 491 100.9z" />
                </svg>
            </button>

            <!-- Play/pause btn -->
            <button id="play-pause-btn" class="btn" title="Reproducir">
                <!-- Play icon -->
                <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                    <path fill="currentColor"
                        d="M187.2 100.9C174.8 94.1 159.8 94.4 147.6 101.6C135.4 108.8 128 121.9 128 136L128 504C128 518.1 135.5 531.2 147.6 538.4C159.7 545.6 174.8 545.9 187.2 539.1L523.2 355.1C536 348.1 544 334.6 544 320C544 305.4 536 291.9 523.2 284.9L187.2 100.9z" />
                </svg>
                <!-- Pause icon -->
                <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" class="d-none">
                    <path fill="currentColor"
                        d="M176 96C149.5 96 128 117.5 128 144L128 496C128 522.5 149.5 544 176 544L240 544C266.5 544 288 522.5 288 496L288 144C288 117.5 266.5 96 240 96L176 96zM400 96C373.5 96 352 117.5 352 144L352 496C352 522.5 373.5 544 400 544L464 544C490.5 544 512 522.5 512 496L512 144C512 117.5 490.5 96 464 96L400 96z" />
                </svg>
            </button>

            <!-- Forward-step btn -->
            <button id="forward-step-btn" class="btn" title="Siguiente">
                <!-- Forward-step icon-->
                <svg id="forward-step-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                    <path fill="currentColor"
                        d="M149 100.8C161.9 93.8 177.7 94.5 190 102.6L448 272.1L448 128C448 110.3 462.3 96 480 96C497.7 96 512 110.3 512 128L512 512C512 529.7 497.7 544 480 544C462.3 544 448 529.7 448 512L448 367.9L190 537.5C177.7 545.6 162 546.3 149 539.3C136 532.3 128 518.7 128 504L128 136C128 121.3 136.1 107.8 149 100.8z" />
                </svg>
            </button>

            <!-- Repeat btn -->
            <button id="repeat-btn" class="btn" title="Repetir playlist">
                <!-- Repeat icon -->
                <svg id="repeat-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                    <path fill="currentColor"
                        d="M534.6 182.6C547.1 170.1 547.1 149.8 534.6 137.3L470.6 73.3C461.4 64.1 447.7 61.4 435.7 66.4C423.7 71.4 416 83.1 416 96L416 128L256 128C150 128 64 214 64 320C64 337.7 78.3 352 96 352C113.7 352 128 337.7 128 320C128 249.3 185.3 192 256 192L416 192L416 224C416 236.9 423.8 248.6 435.8 253.6C447.8 258.6 461.5 255.8 470.7 246.7L534.7 182.7zM105.4 457.4C92.9 469.9 92.9 490.2 105.4 502.7L169.4 566.7C178.6 575.9 192.3 578.6 204.3 573.6C216.3 568.6 224 556.9 224 544L224 512L384 512C490 512 576 426 576 320C576 302.3 561.7 288 544 288C526.3 288 512 302.3 512 320C512 390.7 454.7 448 384 448L224 448L224 416C224 403.1 216.2 391.4 204.2 386.4C192.2 381.4 178.5 384.2 169.3 393.3L105.3 457.3z" />
                    <circle id="repeat-indicator" r="50" cx="320" cy="320" fill="currentColor" class="d-none"></circle>
                </svg>
                <!-- Repeat-1 icon -->
                <svg id="repeat-1-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" class="d-none">
                    <path fill="currentColor"
                        d="M534.6 137.4C547.1 149.9 547.1 170.2 534.6 182.7L470.6 246.7C461.4 255.9 447.7 258.6 435.7 253.6C423.7 248.6 416 236.9 416 224L416 192L256 192C185.3 192 128 249.3 128 320C128 337.7 113.7 352 96 352C78.3 352 64 337.7 64 320C64 214 150 128 256 128L416 128L416 96C416 83.1 423.8 71.4 435.8 66.4C447.8 61.4 461.5 64.2 470.7 73.3L534.7 137.3zM105.4 502.6C92.9 490.1 92.9 469.8 105.4 457.3L169.4 393.3C178.6 384.1 192.3 381.4 204.3 386.4C216.3 391.4 224 403.1 224 416L224 448L384 448C454.7 448 512 390.7 512 320C512 302.3 526.3 288 544 288C561.7 288 576 302.3 576 320C576 426 490 512 384 512L224 512L224 544C224 556.9 216.2 568.6 204.2 573.6C192.2 578.6 178.5 575.8 169.3 566.7L105.3 502.7zM352 280L352 360C352 373.3 341.3 384 328 384C314.7 384 304 373.3 304 360L304 312C294 312 284.6 305.6 281.2 295.6C277 283 283.8 269.4 296.4 265.2L320.4 257.2C327.7 254.8 335.8 256 342 260.5C348.2 265 352 272.3 352 280z" />
                </svg>
            </button>

        </div>

        <div class="volume-container">
            <!-- Volume btn -->
            <button id="volume-btn" class="btn" title="Silenciar">
                <!-- Volume icon -->
                <svg id="volume-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                    <path fill="currentColor"
                        d="M112 416L160 416L294.1 535.2C300.5 540.9 308.7 544 317.2 544C336.4 544 352 528.4 352 509.2L352 130.8C352 111.6 336.4 96 317.2 96C308.7 96 300.5 99.1 294.1 104.8L160 224L112 224C85.5 224 64 245.5 64 272L64 368C64 394.5 85.5 416 112 416zM505.1 171C494.8 162.6 479.7 164.2 471.3 174.5C462.9 184.8 464.5 199.9 474.8 208.3C507.3 234.7 528 274.9 528 320C528 365.1 507.3 405.3 474.8 431.8C464.5 440.2 463 455.3 471.3 465.6C479.6 475.9 494.8 477.4 505.1 469.1C548.3 433.9 576 380.2 576 320.1C576 260 548.3 206.3 505.1 171.1zM444.6 245.5C434.3 237.1 419.2 238.7 410.8 249C402.4 259.3 404 274.4 414.3 282.8C425.1 291.6 432 305 432 320C432 335 425.1 348.4 414.3 357.3C404 365.7 402.5 380.8 410.8 391.1C419.1 401.4 434.3 402.9 444.6 394.6C466.1 376.9 480 350.1 480 320C480 289.9 466.1 263.1 444.5 245.5z" />
                </svg>
                <!-- Volume-slash icon-->
                <svg id="volume-slash-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" class="d-none">
                    <path fill="currentColor"
                        d="M73 39.1C63.6 29.7 48.4 29.7 39.1 39.1C29.8 48.5 29.7 63.7 39 73.1L567 601.1C576.4 610.5 591.6 610.5 600.9 601.1C610.2 591.7 610.3 576.5 600.9 567.2L351.9 318.2L351.9 130.9C351.9 111.7 336.3 96.1 317.1 96.1C308.6 96.1 300.4 99.2 294 104.9L211.8 178L73 39.1zM122.2 224L112 224C85.5 224 64 245.5 64 272L64 368C64 394.5 85.5 416 112 416L160 416L294.1 535.2C300.5 540.9 308.7 544 317.2 544C336.4 544 352 528.4 352 509.2L352 453.8L122.2 224zM471.3 174.4C462.9 184.7 464.5 199.8 474.8 208.2C507.3 234.6 528 274.9 528 320C528 353 516.9 383.4 498.2 407.7L532.4 441.9C559.6 408.8 576 366.3 576 320C576 259.9 548.3 206.2 505.1 171C494.8 162.6 479.7 164.2 471.3 174.5zM428.5 338L463.8 373.3C474 358.1 480 339.7 480 320C480 289.9 466.1 263.1 444.5 245.5C434.2 237.1 419.1 238.7 410.7 249C402.3 259.3 403.9 274.4 414.2 282.8C425.1 291.6 431.9 305 431.9 320.1C431.9 326.5 430.7 332.5 428.4 338.1z" />
                </svg>
            </button>

            <input type="range" id="volume-slider" class="slider" min="0" max="100" value="50" step="1">

            <span id="volume-value"></span>
        </div>

    </main>
